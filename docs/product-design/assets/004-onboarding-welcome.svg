<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 1000" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <rect width="500" height="1000" fill="#EAE6DC"/>
  <text x="40" y="40" font-size="11" letter-spacing="2" fill="#6B7680" font-weight="500">ONBOARDING · 1 · WELCOME</text>

  <g transform="translate(55, 70)">
    <rect x="0" y="0" width="390" height="844" rx="55" fill="#3A3530"/>
    <rect x="6" y="6" width="378" height="832" rx="50" fill="#F6F5F1"/>

    <clipPath id="onb-welcome">
      <rect x="6" y="6" width="378" height="832" rx="50"/>
    </clipPath>

    <g clip-path="url(#onb-welcome)">
      <text x="40" y="36" font-size="14" fill="#0D1014" font-weight="600">7:14</text>
      <g transform="translate(310, 26)">
        <circle cx="0" cy="6" r="1.5" fill="#0D1014"/>
        <circle cx="6" cy="6" r="1.5" fill="#0D1014"/>
        <circle cx="12" cy="6" r="1.5" fill="#0D1014"/>
        <circle cx="18" cy="6" r="1.5" fill="#0D1014"/>
        <rect x="30" y="2" width="20" height="9" rx="2" fill="none" stroke="#0D1014" stroke-width="1"/>
        <rect x="32" y="4" width="14" height="5" fill="#0D1014"/>
      </g>
      <rect x="155" y="18" width="80" height="26" rx="13" fill="#0D1014"/>

      <text x="30" y="110" font-size="38" font-weight="500" letter-spacing="-0.8" fill="#0D1014" font-family="'Tiempos Text', Georgia, serif">runtime<tspan fill="#E8A65A">.</tspan></text>

      <text x="30" y="540" font-size="38" font-weight="700" letter-spacing="-1.4" fill="#0D1014">Beslissen is de</text>
      <text x="30" y="582" font-size="38" font-weight="700" letter-spacing="-1.4" fill="#0D1014">eerste training.</text>
      <text x="30" y="624" font-size="16" fill="#525B65">Aan een afstand, aan een tijd, aan een</text>
      <text x="30" y="644" font-size="16" fill="#525B65">wedstrijd — kies wat past.</text>

      <rect x="30" y="720" width="330" height="56" rx="28" fill="#0D1014"/>
      <text x="195" y="755" font-size="16" font-weight="700" fill="#F6F5F1" text-anchor="middle">Beginnen</text>
      <text x="195" y="798" font-size="13" fill="#6B7680" text-anchor="middle">Al een Runtime-account?</text>

      <rect x="135" y="824" width="120" height="4" rx="2" fill="#C3BCAE"/>
    </g>
  </g>

  <text x="40" y="945" font-size="11" fill="#6B7680">Tier 3 register. Race is the third option, not the first. The skip is dignified.</text>
</svg>
