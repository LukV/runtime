<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 1000" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <rect width="1500" height="1000" fill="#EAE6DC"/>
  <text x="40" y="40" font-size="11" letter-spacing="2" fill="#6B7680" font-weight="500">COACH · EMPTY · FIRST MESSAGE · MID-CONVERSATION</text>

  <g transform="translate(55, 70)">
    <rect x="0" y="0" width="390" height="844" rx="55" fill="#3A3530"/>
    <rect x="6" y="6" width="378" height="832" rx="50" fill="#F6F5F1"/>
    <clipPath id="co-e"><rect x="6" y="6" width="378" height="832" rx="50"/></clipPath>
    <g clip-path="url(#co-e)">
      <text x="40" y="36" font-size="14" fill="#0D1014" font-weight="600">7:14</text>
      <rect x="155" y="18" width="80" height="26" rx="13" fill="#0D1014"/>

      <text x="30" y="84" font-size="10" letter-spacing="1.5" fill="#6B7680" font-weight="500">COACH</text>
      <text x="30" y="118" font-size="26" font-weight="700" letter-spacing="-0.6" fill="#0D1014">An</text>
      <text x="30" y="138" font-size="12" fill="#6B7680">Sportcoach · dietist</text>
      <line x1="30" y1="158" x2="360" y2="158" stroke="#D8D5CB" stroke-width="0.5"/>

      <circle cx="195" cy="280" r="32" fill="#4A463F"/>
      <text x="195" y="288" font-size="22" font-weight="500" fill="#F6F5F1" text-anchor="middle">An</text>

      <text x="195" y="368" font-size="22" font-weight="700" fill="#0D1014" text-anchor="middle" letter-spacing="-0.5">An kijkt mee.</text>
      <text x="195" y="402" font-size="15" fill="#6B7680" text-anchor="middle">Eén of twee keer per week stelt</text>
      <text x="195" y="420" font-size="15" fill="#6B7680" text-anchor="middle">ze een vraag. Hier praten jullie</text>
      <text x="195" y="438" font-size="15" fill="#6B7680" text-anchor="middle">verder.</text>

      <rect x="30" y="730" width="330" height="44" rx="22" fill="#EFEDE5"/>
      <text x="50" y="757" font-size="14" fill="#8C8678">Schrijf iets…</text>

      <rect x="135" y="824" width="120" height="4" rx="2" fill="#C3BCAE"/>
    </g>
  </g>

  <g transform="translate(555, 70)">
    <rect x="0" y="0" width="390" height="844" rx="55" fill="#3A3530"/>
    <rect x="6" y="6" width="378" height="832" rx="50" fill="#F6F5F1"/>
    <clipPath id="co-f"><rect x="6" y="6" width="378" height="832" rx="50"/></clipPath>
    <g clip-path="url(#co-f)">
      <text x="40" y="36" font-size="14" fill="#0D1014" font-weight="600">8:02</text>
      <rect x="155" y="18" width="80" height="26" rx="13" fill="#0D1014"/>

      <text x="30" y="84" font-size="10" letter-spacing="1.5" fill="#6B7680" font-weight="500">COACH</text>
      <text x="30" y="118" font-size="26" font-weight="700" letter-spacing="-0.6" fill="#0D1014">An</text>
      <text x="30" y="138" font-size="12" fill="#6B7680">Sportcoach · dietist</text>
      <line x1="30" y1="158" x2="360" y2="158" stroke="#D8D5CB" stroke-width="0.5"/>

      <text x="195" y="196" font-size="9" letter-spacing="1" fill="#8C8678" text-anchor="middle">ZONDAG 18:42</text>

      <circle cx="42" cy="232" r="14" fill="#4A463F"/>
      <text x="42" y="237" font-size="10" font-weight="500" fill="#F6F5F1" text-anchor="middle">An</text>

      <rect x="64" y="218" width="240" height="76" rx="14" fill="#EFEDE5"/>
      <rect x="64" y="278" width="14" height="16" fill="#EFEDE5"/>
      <text x="78" y="244" font-size="14" fill="#0D1014">Welkom. Ik volg je plan deze</text>
      <text x="78" y="262" font-size="14" fill="#0D1014">twaalf weken. Hoe was de eerste</text>
      <text x="78" y="280" font-size="14" fill="#0D1014">duurloop vandaag?</text>

      <rect x="30" y="730" width="330" height="44" rx="22" fill="#EFEDE5"/>
      <text x="50" y="757" font-size="14" fill="#8C8678">Schrijf iets…</text>

      <rect x="135" y="824" width="120" height="4" rx="2" fill="#C3BCAE"/>
    </g>
  </g>

  <g transform="translate(1055, 70)">
    <rect x="0" y="0" width="390" height="844" rx="55" fill="#3A3530"/>
    <rect x="6" y="6" width="378" height="832" rx="50" fill="#F6F5F1"/>
    <clipPath id="co-m"><rect x="6" y="6" width="378" height="832" rx="50"/></clipPath>
    <g clip-path="url(#co-m)">
      <text x="40" y="36" font-size="14" fill="#0D1014" font-weight="600">7:14</text>
      <rect x="155" y="18" width="80" height="26" rx="13" fill="#0D1014"/>

      <text x="30" y="84" font-size="10" letter-spacing="1.5" fill="#6B7680" font-weight="500">COACH</text>
      <text x="30" y="118" font-size="26" font-weight="700" letter-spacing="-0.6" fill="#0D1014">An</text>
      <line x1="30" y1="158" x2="360" y2="158" stroke="#D8D5CB" stroke-width="0.5"/>

      <text x="195" y="186" font-size="9" letter-spacing="1" fill="#8C8678" text-anchor="middle">ZATERDAG 19:08</text>

      <circle cx="42" cy="222" r="14" fill="#4A463F"/>
      <text x="42" y="227" font-size="10" font-weight="500" fill="#F6F5F1" text-anchor="middle">An</text>
      <rect x="64" y="208" width="180" height="36" rx="14" fill="#EFEDE5"/>
      <text x="78" y="232" font-size="14" fill="#0D1014">Hoe voelde de zaterdag?</text>

      <text x="340" y="280" font-size="9" letter-spacing="1" fill="#8C8678" text-anchor="end">ZATERDAG 20:31</text>

      <rect x="120" y="296" width="232" height="36" rx="14" fill="#0D1014"/>
      <text x="134" y="320" font-size="14" fill="#F6F5F1">Zwaar tot km 8. Daarna ging</text>
      <text x="134" y="338" font-size="14" fill="#F6F5F1">het beter.</text>

      <text x="195" y="386" font-size="9" letter-spacing="1" fill="#8C8678" text-anchor="middle">ZONDAG 07:14</text>

      <circle cx="42" cy="424" r="14" fill="#4A463F"/>
      <text x="42" y="429" font-size="10" font-weight="500" fill="#F6F5F1" text-anchor="middle">An</text>
      <rect x="64" y="410" width="252" height="56" rx="14" fill="#EFEDE5"/>
      <text x="78" y="434" font-size="14" fill="#0D1014">Goed gedaan. Vandaag rustig.</text>
      <text x="78" y="452" font-size="14" fill="#0D1014">Maandag zetten we een tempo in.</text>

      <circle cx="42" cy="510" r="14" fill="#4A463F"/>
      <text x="42" y="515" font-size="10" font-weight="500" fill="#F6F5F1" text-anchor="middle">An</text>
      <rect x="64" y="496" width="270" height="56" rx="14" fill="#EFEDE5"/>
      <text x="78" y="520" font-size="14" fill="#0D1014">Eén ding: slepe je iets met de kuit?</text>
      <text x="78" y="538" font-size="14" fill="#0D1014">Twee runs trager tweede helft.</text>

      <rect x="30" y="730" width="330" height="44" rx="22" fill="#EFEDE5"/>
      <text x="50" y="757" font-size="14" fill="#8C8678">Schrijf iets…</text>

      <rect x="135" y="824" width="120" height="4" rx="2" fill="#C3BCAE"/>
