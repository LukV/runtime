<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <rect width="1000" height="1000" fill="#EAE6DC"/>
  <text x="40" y="40" font-size="11" letter-spacing="2" fill="#6B7680" font-weight="500">ONBOARDING · 5 · GOAL · AND · 6 · RACE ATTACH</text>

  <g transform="translate(55, 70)">
    <rect x="0" y="0" width="390" height="844" rx="55" fill="#3A3530"/>
    <rect x="6" y="6" width="378" height="832" rx="50" fill="#F6F5F1"/>

    <clipPath id="onb-goal">
      <rect x="6" y="6" width="378" height="832" rx="50"/>
    </clipPath>

    <g clip-path="url(#onb-goal)">
      <text x="40" y="36" font-size="14" fill="#0D1014" font-weight="600">7:14</text>
      <rect x="155" y="18" width="80" height="26" rx="13" fill="#0D1014"/>

      <g transform="translate(30, 70)">
        <rect x="0" y="0" width="62" height="2" rx="1" fill="#0D1014"/>
        <rect x="68" y="0" width="62" height="2" rx="1" fill="#0D1014"/>
        <rect x="136" y="0" width="62" height="2" rx="1" fill="#0D1014"/>
        <rect x="204" y="0" width="62" height="2" rx="1" fill="#0D1014"/>
        <rect x="272" y="0" width="62" height="2" rx="1" fill="#D8D5CB"/>
      </g>

      <text x="30" y="110" font-size="10" letter-spacing="1.5" fill="#6B7680" font-weight="500">4 / 5 · HET DOEL</text>
      <text x="30" y="160" font-size="32" font-weight="700" letter-spacing="-1.1" fill="#0D1014">Wat wil je</text>
      <text x="30" y="194" font-size="32" font-weight="700" letter-spacing="-1.1" fill="#0D1014">kunnen?</text>
      <text x="30" y="230" font-size="15" fill="#525B65">Een afstand, een tijd, een gevoel. Eerlijk benoemd.</text>

      <rect x="30" y="270" width="330" height="54" rx="12" fill="#EFEDE5"/>
      <text x="50" y="303" font-size="15" fill="#0D1014">Een 10 km uitlopen</text>

      <rect x="30" y="332" width="330" height="54" rx="12" fill="#0D1014"/>
      <text x="50" y="365" font-size="15" fill="#F6F5F1">10 km onder het uur</text>

      <rect x="30" y="394" width="330" height="54" rx="12" fill="#EFEDE5"/>
      <text x="50" y="427" font-size="15" fill="#0D1014">Een halve marathon afmaken</text>

      <rect x="30" y="456" width="330" height="54" rx="12" fill="#EFEDE5"/>
      <text x="50" y="489" font-size="15" fill="#0D1014">Terug aan het lopen geraken</text>

      <text x="50" y="546" font-size="13" font-style="italic" fill="#6B7680">Iets anders schrijven…</text>

      <rect x="30" y="720" width="330" height="56" rx="28" fill="#0D1014"/>
      <text x="195" y="755" font-size="16" font-weight="700" fill="#F6F5F1" text-anchor="middle">Verder</text>

      <rect x="135" y="824" width="120" height="4" rx="2" fill="#C3BCAE"/>
    </g>
  </g>

  <g transform="translate(505, 70)">
    <rect x="0" y="0" width="390" height="844" rx="55" fill="#3A3530"/>
    <rect x="6" y="6" width="378" height="832" rx="50" fill="#F6F5F1"/>

    <clipPath id="onb-race">
      <rect x="6" y="6" width="378" height="832" rx="50"/>
    </clipPath>

    <g clip-path="url(#onb-race)">
      <text x="40" y="36" font-size="14" fill="#0D1014" font-weight="600">7:14</text>
      <rect x="155" y="18" width="80" height="26" rx="13" fill="#0D1014"/>

      <g transform="translate(30, 70)">
        <rect x="0" y="0" width="62" height="2" rx="1" fill="#0D1014"/>
        <rect x="68" y="0" width="62" height="2" rx="1" fill="#0D1014"/>
        <rect x="136" y="0" width="62" height="2" rx="1" fill="#0D1014"/>
        <rect x="204" y="0" width="62" height="2" rx="1" fill="#0D1014"/>
        <rect x="272" y="0" width="62" height="2" rx="1" fill="#0D1014"/>
      </g>

      <text x="30" y="110" font-size="10" letter-spacing="1.5" fill="#6B7680" font-weight="500">5 / 5 · OPTIONEEL</text>
      <text x="30" y="160" font-size="28" font-weight="700" letter-spacing="-1" fill="#0D1014">Wil je er een</text>
      <text x="30" y="194" font-size="28" font-weight="700" letter-spacing="-1" fill="#0D1014">datum aan hangen?</text>
      <text x="30" y="228" font-size="15" fill="#525B65">Een wedstrijd maakt het scherper.</text>

      <rect x="30" y="270" width="330" height="62" rx="12" fill="#EFEDE5"/>
      <text x="50" y="294" font-size="16" font-weight="600" fill="#0D1014">Stadsloop Mechelen</text>
      <text x="50" y="315" font-size="12" fill="#6B7680">30 augustus · 10 km · weg</text>
      <text x="343" y="294" font-size="11" fill="#6B7680" text-anchor="end">over 96 dgn</text>

      <rect x="30" y="340" width="330" height="62" rx="12" fill="#EFEDE5"/>
      <text x="50" y="364" font-size="16" font-weight="600" fill="#0D1014">Antwerp 10 Miles · 10 km</text>
      <text x="50" y="385" font-size="12" fill="#6B7680">21 september · 10 km · weg</text>
      <text x="343" y="364" font-size="11" fill="#6B7680" text-anchor="end">over 118 dgn</text>

      <rect x="30" y="410" width="330" height="62" rx="12" fill="#EFEDE5"/>
      <text x="50" y="434" font-size="16" font-weight="600" fill="#0D1014">Jogging Bonheiden</text>
      <text x="50" y="455" font-size="12" fill="#6B7680">14 september · 10 km · weg</text>
      <text x="343" y="434" font-size="11" fill="#6B7680" text-anchor="end">over 111 dgn</text>

      <rect x="30" y="490" width="330" height="62" rx="12" fill="#0D1014"/>
      <circle cx="55" cy="521" r="12" fill="#E8A65A" fill-opacity="0.18"/>
      <circle cx="55" cy="521" r="4" fill="#E8A65A"/>
      <text x="80" y="516" font-size="15" font-weight="600" fill="#F6F5F1">Geen wedstrijd, mijn doel volstaat</text>
      <text x="80" y="535" font-size="12" fill="#8C8678">Het plan eindigt op een datum die jij kiest.</text>

      <rect x="30" y="720" width="330" height="56" rx="28" fill="#0D1014"/>
      <text x="195" y="755" font-size="16" font-weight="700" fill="#F6F5F1" text-anchor="middle">Plan bekijken</text>

      <rect x="135" y="824" width="120" height="4" rx="2" fill="#C3BCAE"/>
    </g>
  </g>
</svg>
